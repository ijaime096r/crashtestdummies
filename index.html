<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tests ferroviarios</title>

<style>

body {

    font-family: Arial;
    margin: 20px;
    text-align: center;

}

#login {

    max-width: 400px;
    margin: auto;

}

#login input {

    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;

}

#login button {

    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;

}

#app {

    display: none;

}

#menu {

    margin-bottom: 30px;

}

#menu button {

    padding: 15px;
    margin: 10px;
    font-size: 16px;

}

#info {

    font-weight: bold;
    margin-bottom: 20px;

}

#pregunta {

    font-size: 20px;
    margin-bottom: 20px;

}

button {

    display: block;
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 16px;

}

.correcta {

    background-color: #8fd694;

}

.incorrecta {

    background-color: #f28b82;

}

#siguiente {

    margin-top: 25px;

}

</style>

</head>

<body>

<div id="login">

<h2>Acceso al test</h2>

<input type="password" id="clave" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

</div>

<div id="app">

<h1>Test ferroviario</h1>

<div id="menu">

<button onclick="modoEntrenamiento()">Modo entrenamiento</button>

<button onclick="modoExamen()">Modo examen</button>

<button onclick="modoFalladas()">Repasar falladas</button>

</div>

<div id="info"></div>

<div id="pregunta"></div>

<div id="opciones"></div>

<button id="siguiente" onclick="siguiente()">Siguiente pregunta</button>

</div>

<script src="script.js"></script>

</body>

</html>
